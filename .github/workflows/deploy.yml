name: Deploy Design System Site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library packages (tokens, utils, components)
        run: npx turbo run build --filter=@storyhouse/tokens --filter=@storyhouse/utils --filter=@storyhouse/components

      - name: Build Docs (Astro)
        run: |
          cd packages/docs
          npm run build

      - name: Build Storybook
        run: |
          cd packages/storybook
          npm run build
      - name: Verify component pages exist
        run: |
          echo "Pages built:"
          ls packages/docs/dist/components/ | wc -l
          echo "First 10:"
          ls packages/docs/dist/components/ | head -10
          echo "---"
          if [ "$(ls packages/docs/dist/components/ | wc -l)" -lt 30 ]; then
            echo "ERROR: Expected 30+ component pages, found fewer"
            exit 1
          fi
          echo "Storybook files:"
          ls packages/storybook/storybook-static/ | head -5
          echo "Total files: $(find packages/storybook/storybook-static -type f | wc -l)"

      - name: Prepare GitHub Pages output
        run: |
          mkdir -p _site/storybook
          cp -r packages/docs/dist/* _site/
          cp -r packages/storybook/storybook-static/* _site/storybook/
          # 404.html is built by Astro's 404.astro — no need to copy index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
